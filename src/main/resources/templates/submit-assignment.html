<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Submit Assignment — ASS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav>
    <span class="brand">Assignment Submission System</span>
    <div class="nav-links">
        <a th:href="@{/student/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Sign out</button>
        </form>
    </div>
</nav>
<div class="page-narrow" style="padding-top:2rem">
    <div class="card">
        <div class="card-header">
            <h1>Submit assignment</h1>
            <p th:if="${assignment != null}"
               th:text="'Submitting for: ' + ${assignment.title} + ' — ' + ${assignment.courseId}"></p>
            <p th:if="${assignment == null}">Complete the form below to submit your work</p>
        </div>

        <div th:if="${assignment != null}"
             class="alert alert-warning" role="alert" style="margin-bottom:1rem">
            Max file size: <strong th:text="${assignment.maxFileSizeMB} + ' MB'"></strong>
            &nbsp;|&nbsp;
            Permitted types: <strong th:text="${assignment.permittedFileTypes}"></strong>
            &nbsp;|&nbsp;
            Deadline: <strong th:text="${assignment.deadline}"></strong>
        </div>

        <form th:action="@{/student/submit}" th:object="${submission}" method="post">
            <input type="hidden" name="assignmentId" th:value="${assignmentId}"/>
            <div class="form-group">
                <label for="fileName">File name <span class="req" aria-hidden="true">*</span></label>
                <input type="text" id="fileName" th:field="*{fileName}"
                       placeholder="e.g. report_final.pdf"
                       aria-required="true"
                       aria-describedby="fileName-hint"/>
                <span id="fileName-hint" class="form-hint">
                    Enter the exact name of the file you are submitting
                </span>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="fileType">File type <span class="req" aria-hidden="true">*</span></label>
                    <select id="fileType" th:field="*{fileType}" aria-required="true">
                        <option value="" disabled selected>Select…</option>
                        <th:block th:if="${assignment != null}"
                                  th:each="type : ${#strings.arraySplit(assignment.permittedFileTypes, ',')}">
                            <option th:value="${#strings.trim(type)}"
                                    th:text="${#strings.toUpperCase(#strings.trim(type))}"></option>
                        </th:block>
                        <th:block th:if="${assignment == null}">
                            <option value="pdf">PDF</option>
                            <option value="docx">DOCX</option>
                            <option value="zip">ZIP</option>
                            <option value="txt">TXT</option>
                        </th:block>
                    </select>
                </div>
                <div class="form-group">
                    <label for="fileSizeMB">File size (MB) <span class="req" aria-hidden="true">*</span></label>
                    <input type="number" id="fileSizeMB" th:field="*{fileSizeMB}"
                           step="0.01" min="0.01"
                           th:max="${assignment != null ? assignment.maxFileSizeMB : 500}"
                           placeholder="e.g. 2.5"
                           aria-required="true"/>
                </div>
            </div>
            <div class="form-group">
                <label for="additionalInfo">Additional information</label>
                <textarea id="additionalInfo" th:field="*{additionalInfo}"
                          rows="3"
                          placeholder="Any additional notes or mitigating circumstances"></textarea>
            </div>
            <p class="req-note"><span aria-hidden="true">*</span> Required fields</p>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div style="display:flex;gap:10px;margin-top:0.5rem">
                <button type="submit" class="btn btn-primary" style="flex:1">Submit assignment</button>
                <a th:href="@{/student/dashboard}" class="btn btn-secondary" style="flex:1;text-align:center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
