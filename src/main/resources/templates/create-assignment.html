<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Assignment — ASS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav>
    <span class="brand">Assignment Submission System</span>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Sign out</button>
        </form>
    </div>
</nav>
<div class="page-narrow" style="padding-top:2rem">
    <div class="card">
        <div class="card-header">
            <h1>Create assignment</h1>
            <p>Complete the form below to create a new assignment</p>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" role="alert"
             th:text="${successMessage}"></div>

        <form th:action="@{/create-assignment}" th:object="${assignment}" method="post">

            <div class="form-row">
                <div class="form-group">
                    <label for="assignmentId">Assignment ID <span class="req" aria-hidden="true">*</span></label>
                    <input type="text" id="assignmentId" th:field="*{assignmentId}"
                           placeholder="e.g. A017"
                           aria-required="true"/>
                </div>
                <div class="form-group">
                    <label for="courseId">Course ID(s) <span class="req" aria-hidden="true">*</span></label>
                    <input type="text" id="courseId" th:field="*{courseId}"
                           placeholder="e.g. CS4012, CS5012"
                           aria-required="true"
                           aria-describedby="courseId-hint"/>
                    <span id="courseId-hint" class="form-hint">
                        Comma separated if multiple
                    </span>
                </div>
            </div>

            <div class="form-group">
                <label for="title">Title <span class="req" aria-hidden="true">*</span></label>
                <input type="text" id="title" th:field="*{title}"
                       placeholder="e.g. Software Design Report"
                       aria-required="true"/>
            </div>

            <div class="form-group">
                <label for="studentId">Student ID</label>
                <input type="text" id="studentId" th:field="*{studentId}"
                       placeholder="Leave blank for all students on this course"
                       aria-describedby="studentId-hint"/>
                <span id="studentId-hint" class="form-hint">
                    Optional — only set this for individual student assignments or special circumstances
                </span>
            </div>

            <input type="hidden" name="adminId" th:value="${adminId}"/>

            <div class="form-row">
                <div class="form-group">
                    <label for="deadline">Deadline <span class="req" aria-hidden="true">*</span></label>
                    <input type="datetime-local" id="deadline" th:field="*{deadline}"
                           aria-required="true"/>
                </div>
                <div class="form-group">
                    <label for="maxFileSizeMB">Max file size (MB) <span class="req" aria-hidden="true">*</span></label>
                    <input type="number" id="maxFileSizeMB" th:field="*{maxFileSizeMB}"
                           placeholder="e.g. 500"
                           aria-required="true"/>
                </div>
            </div>

            <div class="form-group">
                <label for="permittedFileTypes">Permitted file types <span class="req" aria-hidden="true">*</span></label>
                <input type="text" id="permittedFileTypes" th:field="*{permittedFileTypes}"
                       placeholder="e.g. pdf, docx, zip"
                       aria-required="true"
                       aria-describedby="fileTypes-hint"/>
                <span id="fileTypes-hint" class="form-hint">Comma separated e.g. pdf, docx, zip, txt</span>
            </div>

            <div class="form-group">
                <label for="additionalInfo">Additional information</label>
                <textarea id="additionalInfo" th:field="*{additionalInfo}" rows="3"
                          placeholder="Any additional notes or instructions for students"></textarea>
            </div>

            <p class="req-note"><span aria-hidden="true">*</span> Required fields</p>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div style="display:flex;gap:10px;margin-top:0.5rem">
                <button type="submit" class="btn btn-primary" style="flex:1">
                    Create assignment
                </button>
                <a th:href="@{/admin/dashboard}" class="btn btn-secondary" style="flex:1;text-align:center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
