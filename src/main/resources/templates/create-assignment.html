<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Assignment</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #2C2C2A; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: bold; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #888780; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        button { background: #0C447C; color: white; padding: 10px 20px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        button:hover { background: #042C53; }
        .success { color: green; font-weight: bold; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <h1>Create Assignment</h1>

    <p th:if="${successMessage}" th:text="${successMessage}" class="success"></p>

    <form th:action="@{/create-assignment}" th:object="${assignment}" method="post">

        <div class="form-group">
            <label>Assignment ID</label>
            <input type="text" th:field="*{assignmentId}" required />
        </div>
        <div class="form-group">
            <label>Student ID</label>
            <input type="text" th:field="*{studentId}" />
        </div>
        <div class="form-group">
            <label>Admin ID</label>
            <input type="text" th:field="*{adminId}" required />
        </div>
        <div class="form-group">
            <label>Title</label>
            <input type="text" th:field="*{title}" required />
        </div>
        <div class="form-group">
            <label>Course ID</label>
            <input type="text" th:field="*{courseId}" required />
        </div>
        <div class="form-group">
            <label>Deadline</label>
            <input type="datetime-local" th:field="*{deadline}" required />
        </div>
        <div class="form-group">
            <label>Max File Size (MB)</label>
            <input type="number" th:field="*{maxFileSizeMB}" value="10" required />
        </div>
        <div class="form-group">
            <label>Permitted File Types</label>
            <input type="text" th:field="*{permittedFileTypes}" placeholder="e.g. pdf,docx" required />
        </div>
        <div class="form-group">
            <label>Additional Info</label>
            <textarea th:field="*{additionalInfo}" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select th:field="*{status}">
                <option value="SUBMITTED">Submitted</option>
                <option value="REVIEWED">Reviewed</option>
                <option value="DELETED">Deleted</option>
            </select>
        </div>

        <button type="submit">Create Assignment</button>
    </form>
</body>
</html>
