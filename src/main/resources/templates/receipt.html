<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Submission Receipt — ASS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <span class="brand">Assignment Submission System</span>
    <div class="nav-links">
        <a th:href="@{/student/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Sign out</button>
        </form>
    </div>
</nav>

<div class="page-narrow" style="padding-top:2rem">

    <div class="alert alert-success" role="alert">
        Your assignment has been submitted successfully.
    </div>

    <div class="card">
        <div class="card-header">
            <h1>Submission receipt</h1>
            <p>Please keep your case reference for your records</p>
        </div>

        <div class="receipt-ref" th:text="${caseReference}" aria-label="Case reference number"></div>

        <div class="receipt-detail">
            <span class="label">Assignment ID</span>
            <span class="value" th:text="${submission.assignmentId}"></span>
        </div>
        <div class="receipt-detail">
            <span class="label">File name</span>
            <span class="value" th:text="${submission.fileName}"></span>
        </div>
        <div class="receipt-detail">
            <span class="label">File type</span>
            <span class="value" th:text="${submission.fileType}"></span>
        </div>
        <div class="receipt-detail">
            <span class="label">File size</span>
            <span class="value" th:text="${submission.fileSizeMB + ' MB'}"></span>
        </div>
        <div class="receipt-detail">
            <span class="label">Status</span>
            <span class="value">
                <span class="badge badge-submitted">SUBMITTED</span>
            </span>
        </div>

        <div style="margin-top:1.5rem;display:flex;gap:10px">
            <a th:href="@{/student/dashboard}" class="btn btn-primary" style="flex:1;text-align:center">
                Back to dashboard
            </a>
        </div>
    </div>

</div>
</body>
</html>
