<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Assignment — ASS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <span class="brand">Assignment Submission System</span>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Sign out</button>
        </form>
    </div>
</nav>

<div class="page-narrow" style="padding-top:2rem">
    <div class="card">
        <div class="card-header">
            <h1>Edit assignment</h1>
            <p>Update the details of this assignment</p>
        </div>

        <form th:action="@{/admin/edit-assignment}" th:object="${assignment}" method="post">
            <input type="hidden" th:field="*{assignmentId}"/>
            <input type="hidden" th:field="*{adminId}"/>
            <input type="hidden" th:field="*{studentId}"/>

            <div class="form-row">
                <div class="form-group">
                    <label for="title">Title <span class="req" aria-hidden="true">*</span></label>
                    <input type="text" id="title" th:field="*{title}" aria-required="true"/>
                </div>
                <div class="form-group">
                    <label for="courseId">Course ID <span class="req" aria-hidden="true">*</span></label>
                    <input type="text" id="courseId" th:field="*{courseId}" aria-required="true"/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="deadline">Deadline <span class="req" aria-hidden="true">*</span></label>
                    <input type="datetime-local" id="deadline" th:field="*{deadline}"
                           aria-required="true"/>
                </div>
                <div class="form-group">
                    <label for="maxFileSizeMB">Max file size (MB) <span class="req" aria-hidden="true">*</span></label>
                    <input type="number" id="maxFileSizeMB" th:field="*{maxFileSizeMB}"
                           aria-required="true"/>
                </div>
            </div>

            <div class="form-group">
                <label for="permittedFileTypes">Permitted file types <span class="req" aria-hidden="true">*</span></label>
                <input type="text" id="permittedFileTypes" th:field="*{permittedFileTypes}"
                       aria-required="true"
                       aria-describedby="fileTypes-hint"/>
                <span id="fileTypes-hint" class="form-hint">Comma separated e.g. pdf, docx, zip</span>
            </div>

            <div class="form-group">
                <label for="additionalInfo">Additional information</label>
                <textarea id="additionalInfo" th:field="*{additionalInfo}" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="status">Status <span class="req" aria-hidden="true">*</span></label>
                <select id="status" th:field="*{status}" aria-required="true">
                    <option value="SUBMITTED">Active</option>
                    <option value="REVIEWED">Reviewed</option>
                    <option value="DELETED">Deleted</option>
                </select>
            </div>

            <p class="req-note"><span aria-hidden="true">*</span> Required fields</p>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div style="display:flex;gap:10px;margin-top:0.5rem">
                <button type="submit" class="btn btn-primary" style="flex:1">Save changes</button>
                <a th:href="@{/admin/dashboard}" class="btn btn-secondary"
                   style="flex:1;text-align:center">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
