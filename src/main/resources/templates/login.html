<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign in — ASS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="1" y="7" width="14" height="8" rx="2" stroke="white" stroke-width="1.2"/>
                    <path d="M4 7V5a4 4 0 018 0v2" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
            </div>
            <span class="auth-logo-text">Assignment Submission System</span>
        </div>

        <div th:if="${param.registered}" class="alert alert-success" role="alert">
            Account created successfully. Please sign in.
        </div>
        <div th:if="${param.logout}" class="alert alert-success" role="alert">
            You have been signed out successfully.
        </div>
        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            Invalid email or password. Please try again.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">University email <span class="req" aria-hidden="true">*</span></label>
                <input type="email" id="username" name="username"
                       autocomplete="email"
                       placeholder="s12345678@university.ac.uk"
                       aria-required="true"
                       aria-describedby="email-hint"/>
                <span id="email-hint" class="form-hint">Use your university email address</span>
            </div>
            <div class="form-group">
                <label for="password">Password <span class="req" aria-hidden="true">*</span></label>
                <input type="password" id="password" name="password"
                       autocomplete="current-password"
                       placeholder="Enter your password"
                       aria-required="true"/>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">
                Sign in
            </button>
        </form>
