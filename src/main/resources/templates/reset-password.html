<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password — ASS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <span class="brand">Assignment Submission System</span>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Sign out</button>
        </form>
    </div>
</nav>

<div class="page-narrow" style="padding-top:2rem">
    <div class="card">
        <div class="card-header">
            <h1>Reset student password</h1>
            <p th:if="${student != null}"
               th:text="'Resetting password for: ' + ${student.fullName} + ' — ' + ${student.email}"></p>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger" role="alert"
             th:text="${errorMessage}"></div>

        <form th:action="@{/admin/reset-password}" method="post">
            <input type="hidden" name="studentId" th:value="${student.studentId}"/>

            <div class="form-group">
                <label for="newPassword">New password <span class="req" aria-hidden="true">*</span></label>
                <input type="text" id="newPassword" name="newPassword"
                       placeholder="e.g. abc123"
                       aria-required="true"
                       aria-describedby="pw-hint"/>
                <span id="pw-hint" class="form-hint">
                    6 to 10 characters. First 3 characters must be letters e.g. abc123
                </span>
            </div>

            <p class="req-note"><span aria-hidden="true">*</span> Required fields</p>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div style="display:flex;gap:10px;margin-top:0.5rem">
                <button type="submit" class="btn btn-primary" style="flex:1">Reset password</button>
                <a th:href="@{/admin/dashboard}" class="btn btn-secondary"
                   style="flex:1;text-align:center">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
