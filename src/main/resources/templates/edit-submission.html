<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Submission — ASS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav>
    <span class="brand">Assignment Submission System</span>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Sign out</button>
        </form>
    </div>
</nav>
<div class="page-narrow" style="padding-top:2rem">
    <div class="card">
        <div class="card-header">
            <h1>Edit submission</h1>
            <p>Update the details of this submission</p>
        </div>
        <form th:action="@{/admin/edit}" th:object="${submission}" method="post">
            <input type="hidden" th:field="*{submissionId}"/>
            <input type="hidden" th:field="*{studentId}"/>
            <input type="hidden" th:field="*{assignmentId}"/>
            <input type="hidden" th:field="*{caseReference}"/>
            <div class="form-group">
                <label for="fileName">File name <span class="req" aria-hidden="true">*</span></label>
                <input type="text" id="fileName" th:field="*{fileName}"
                       aria-required="true"/>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="fileType">File type <span class="req" aria-hidden="true">*</span></label>
                    <select id="fileType" th:field="*{fileType}" aria-required="true">
                        <option value="pdf">PDF</option>
                        <option value="docx">DOCX</option>
                        <option value="zip">ZIP</option>
                        <option value="txt">TXT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="fileSizeMB">File size (MB) <span class="req" aria-hidden="true">*</span></label>
                    <input type="number" id="fileSizeMB" th:field="*{fileSizeMB}"
                           step="0.01" min="0.01" max="500"
                           aria-required="true"/>
                </div>
            </div>
            <div class="form-group">
                <label for="status">Status <span class="req" aria-hidden="true">*</span></label>
                <select id="status" th:field="*{status}" aria-required="true">
                    <option value="SUBMITTED">Submitted</option>
                    <option value="LATE">Late Submission</option>
                </select>
            </div>
            <div class="form-group">
                <label for="additionalInfo">Additional information</label>
                <textarea id="additionalInfo" th:field="*{additionalInfo}" rows="3"></textarea>
            </div>
            <p class="req-note"><span aria-hidden="true">*</span> Required fields</p>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div style="display:flex;gap:10px;margin-top:0.5rem">
                <button type="submit" class="btn btn-primary" style="flex:1">Save changes</button>
                <a th:href="@{/admin/dashboard}" class="btn btn-secondary"
                   style="flex:1;text-align:center">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
